<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Meta Tags -->
    <meta name="description" content="Sistem Informasi Praktikum - Akademi Kebidanan Mega Buana. Progressive Web App dengan dukungan offline" />
    
    <!-- Dynamic Theme Color for Light/Dark Mode -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020817" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS Native App Capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SiPraktik" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Performance & Network Hints -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Offline Support -->
    <meta name="application-name" content="Sistem Praktikum AKMB" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Sistem Praktikum - Akademi Kebidanan Mega Buana</title>

    <!-- Fonts — preconnect first for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!--
      Plus Jakarta Sans  — body & UI text
      Crimson Pro        — display headings (auth brand panel, landing page)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- App container -->
    <div id="root">
      <!-- PWA Native App Loading State -->
      <style>
        .pwa-loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #f8fafc;
          font-family: system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          .pwa-loader-container {
            background-color: #020817;
          }
        }
        .pwa-loader-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(59, 130, 246, 0.2);
          border-left-color: #3b82f6;
          border-radius: 50%;
          animation: pwa-spin 1s linear infinite;
          margin-bottom: 24px;
        }
        .pwa-loader-text {
          color: #3b82f6;
          font-size: 1.125rem;
          font-weight: 600;
          letter-spacing: 0.5px;
          animation: pwa-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .pwa-loader-brand {
          position: absolute;
          bottom: 32px;
          font-size: 0.875rem;
          color: #64748b;
          font-weight: 500;
        }
        @media (prefers-color-scheme: dark) {
          .pwa-loader-brand { color: #94a3b8; }
        }
        @keyframes pwa-spin {
          to { transform: rotate(360deg); }
        }
        @keyframes pwa-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div class="pwa-loader-container">
        <div class="pwa-loader-spinner"></div>
        <div class="pwa-loader-text">SiPraktik AKMB</div>
        <div class="pwa-loader-brand">Sistem Informasi Praktikum</div>
      </div>
    </div>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
      <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 2rem;
        text-align: center;
      ">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: 1rem;">JavaScript Diperlukan</h1>
          <p style="font-size: 1.1rem; opacity: 0.9;">
            Sistem Praktikum memerlukan JavaScript untuk berfungsi.<br>
            Mohon aktifkan JavaScript di browser Anda dan muat ulang halaman.
          </p>
        </div>
      </div>
    </noscript>

    <!-- Service Worker Migration (Production-Safe) -->
    <script>
      (function() {
        'use strict';

        const TARGET_SW_VERSION = 'v1.0.5';
        const MIGRATION_FLAG = 'pwa_sw_migration_' + TARGET_SW_VERSION.replace(/\W/g, '_') + '_completed';
        const debugSwMigration = localStorage.getItem('debug_sw_migration') === 'true';

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations()
            .then(function(registrations) {
              if (registrations.length === 0) {
                localStorage.setItem(MIGRATION_FLAG, new Date().toISOString());
                return;
              }

              if (debugSwMigration) {
                console.log('[SW Migration] Found ' + registrations.length + ' Service Worker(s) to check');
              }

              var needsCleanup = false;
              var checkPromises = registrations.map(function(reg) {
                return new Promise(function(resolve) {
                  if (!reg.active) { resolve(false); return; }

                  var channel = new MessageChannel();
                  reg.active.postMessage({ type: 'GET_VERSION' }, [channel.port2]);

                  channel.port1.onmessage = function(event) {
                    var version = event.data && event.data.version;
                    if (version !== TARGET_SW_VERSION) {
                      if (debugSwMigration) console.log('[SW Migration] Old version detected:', version);
                      resolve(true);
                    } else {
                      resolve(false);
                    }
                  };

                  setTimeout(function() {
                    if (debugSwMigration) console.log('[SW Migration] No version response, cleanup needed');
                    resolve(true);
                  }, 1200);
                });
              });

              Promise.all(checkPromises).then(function(results) {
                needsCleanup = results.some(function(r) { return r; });

                if (!needsCleanup) {
                  localStorage.setItem(MIGRATION_FLAG, new Date().toISOString());
                  if (debugSwMigration) console.log('[SW Migration] Current version OK, no migration needed');
                  return;
                }

                var authBackup = null;
                try {
                  var authKey = Object.keys(localStorage).find(function(key) {
                    return key.startsWith('sb-') && key.includes('-auth-token');
                  });
                  if (authKey) {
                    authBackup = { key: authKey, value: localStorage.getItem(authKey) };
                  }
                } catch (err) {}

                var unregisterPromises = registrations.map(function(reg) {
                  return reg.unregister();
                });

                var cacheCleanup = Promise.resolve();
                if ('caches' in window) {
                  cacheCleanup = caches.keys().then(function(cacheNames) {
                    return Promise.all(cacheNames.map(function(cacheName) {
                      if (
                        cacheName.indexOf('praktikum-pwa') !== -1 ||
                        cacheName.indexOf('workbox-precache') !== -1
                      ) {
                        return caches.delete(cacheName);
                      }
                      return null;
                    }));
                  });
                }

                Promise.all(unregisterPromises)
                  .then(function() { return cacheCleanup; })
                  .then(function() {
                    if (authBackup && authBackup.value) {
                      try { localStorage.setItem(authBackup.key, authBackup.value); } catch (err) {}
                    }
                    localStorage.setItem(MIGRATION_FLAG, new Date().toISOString());
                    if (debugSwMigration) console.log('[SW Migration] Migration complete, reloading...');
                    setTimeout(function() { window.location.reload(); }, 500);
                  })
                  .catch(function() {
                    localStorage.setItem(MIGRATION_FLAG, new Date().toISOString());
                  });
              });
            })
            .catch(function() {
              localStorage.setItem(MIGRATION_FLAG, new Date().toISOString());
            });
        }
      })();
    </script>

    <!-- Main app script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
